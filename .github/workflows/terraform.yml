name: Terraform

on:
  pull_request:
    branches: [main]
    paths: [terraform/**]
  push:
    branches: [main]
    paths: [terraform/**]
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: cd terraform && terraform init -input=false
      - name: Terraform Plan
        id: plan
        run: cd terraform && terraform plan -no-color -input=false
        continue-on-error: true
      - name: Comment PR with Plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.plan.outputs.stdout || 'Plan output not available' }}`;
            const truncated = output.length > 60000 ? output.substring(0, 60000) + '\n...(truncated)' : output;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan\n\`\`\`\n${truncated}\n\`\`\``
            });

  apply:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: cd terraform && terraform init -input=false
      - name: Terraform Apply
        run: cd terraform && terraform apply -auto-approve -input=false
