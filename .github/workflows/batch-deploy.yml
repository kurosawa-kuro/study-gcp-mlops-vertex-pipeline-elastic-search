name: Deploy Batch Job

on:
  push:
    branches: [main]
    paths: [src/batch/**]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: |
          cd src/batch
          pip install -r requirements-dev.txt
          PYTHONPATH=. pytest -v test_main.py

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Auth Docker
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet
      - name: Build & Push
        run: |
          docker build -t asia-northeast1-docker.pkg.dev/mlops-dev-a/mlops-dev-a-docker/ml-batch:latest ./src/batch/
          docker push asia-northeast1-docker.pkg.dev/mlops-dev-a/mlops-dev-a-docker/ml-batch:latest
      - name: Update Cloud Run Job
        run: |
          gcloud run jobs update ml-batch \
            --image asia-northeast1-docker.pkg.dev/mlops-dev-a/mlops-dev-a-docker/ml-batch:latest \
            --region asia-northeast1 \
            --project mlops-dev-a
